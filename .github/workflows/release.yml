name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'      # Semantic version tags (v1.0.0)
      - '20[0-9][0-9].*.*'  # Date-based tags (2025.47.2)
  workflow_dispatch:

# Least-privilege default. The publish job escalates id-token:write for PyPI OIDC.
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Fetch all history and tags for version detection

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files

      - name: Run tests with coverage
        run: uv run pytest --cov=bindu --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=60

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b  # v2.3.6
        continue-on-error: true  # Don't block release if Coveralls is down
        with:
          file: coverage.xml
          format: cobertura

      - name: Build package
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bindu-dist
          path: dist/

      - name: Publish package to PyPI
        run: uv publish --token ${{ secrets.PYPI_API_TOKEN }} dist/*
