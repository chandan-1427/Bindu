[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Mark tests that use asyncio
markers =
    asyncio: mark a test as an asyncio coroutine
    unit: mark test as a unit test
    integration: mark test as an integration test
    e2e: mark test as an end-to-end test
    slow: mark test as slow running
    x402: mark tests related to x402 integration
    boxd_e2e: real-boxd-VM runtime tests (require BOXD_E2E=1 and BOXD_API_KEY)
    network: live external-network tests (require X402_NETWORK_TESTS=1; off by default)

# Configure asyncio behavior for tests
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using pytest-cov)
# addopts = --cov=bindu --cov-report=html --cov-report=term-missing
